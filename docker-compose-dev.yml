services:
  web:
    build: .
    container_name: bibel_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: bibel_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bibel_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  smtp4dev:
    image: rnwood/smtp4dev:linux-amd64-v3
    container_name: bibel_smtp4dev
    ports:
      - "3000:80"   # Web UI (access at http://localhost:3000)
      - "2525:25"   # SMTP port (for Django to send emails)
    volumes:
      - smtp4dev_data:/smtp4dev
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  smtp4dev_data:
